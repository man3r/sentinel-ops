version: "3.9"

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: sentinelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (local DB UI) ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sentinelops-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sentinelops.local
      PGADMIN_DEFAULT_PASSWORD: localdev
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
