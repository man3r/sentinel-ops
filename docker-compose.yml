version: "3.9"

services:
  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinelops-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: sentinelops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── pgAdmin (local DB UI) ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sentinelops-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sentinelops.local
      PGADMIN_DEFAULT_PASSWORD: localdev
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── OpenSearch (local vector DB for RAG) ───────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: sentinelops-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: unless-stopped

volumes:
  postgres_data:
  opensearch_data:
